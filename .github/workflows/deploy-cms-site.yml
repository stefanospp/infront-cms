name: Deploy CMS Site

on:
  repository_dispatch:
    types: [cms-publish]
  workflow_dispatch:
    inputs:
      slug:
        description: 'Site slug (e.g. videoshoot, theorium)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SITE_SLUG: ${{ inputs.slug || github.event.client_payload.slug }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Build site
        run: pnpm --filter "@agency/${SITE_SLUG}" run build
        env:
          DIRECTUS_URL: ${{ secrets.DIRECTUS_URL }}
          DIRECTUS_TOKEN: ${{ secrets.DIRECTUS_TOKEN }}
          PREVIEW_TOKEN: ${{ secrets.PREVIEW_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GH_DEPLOY_PAT: ${{ secrets.GH_DEPLOY_PAT }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: sites/${{ env.SITE_SLUG }}
          command: deploy
