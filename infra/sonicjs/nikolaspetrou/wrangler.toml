name = "nikolaspetrou-cms"
main = "src/index.ts"
compatibility_date = "2026-03-22"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "nikolaspetrou-cms"
database_id = "TODO"
migrations_dir = "node_modules/@sonicjs-cms/core/migrations"

[[r2_buckets]]
