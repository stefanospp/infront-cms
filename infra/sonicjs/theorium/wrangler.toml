name = "theorium-cms"
main = "src/index.ts"
compatibility_date = "2026-03-22"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "theorium-cms"
database_id = "TODO"
migrations_dir = "node_modules/@sonicjs-cms/core/migrations"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "theorium-cms-media"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "TODO"

[vars]
ADMIN_EMAIL = "admin@theorium.cy"
ADMIN_PASSWORD = "admin1234!"
JWT_SECRET = "theorium-cms-local-dev-secret"
