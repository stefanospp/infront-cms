# Kamal deployment config for the admin UI
# Deploy with: kamal deploy -c infra/admin/deploy.yml
#
# Architecture:
#   Cloudflare Tunnel (cloudflared) -> localhost:4321 -> admin container
#   No ports exposed to the internet. Tunnel handles SSL + routing.

service: infront-admin

image: infront-admin

servers:
  web:
    hosts:
      - 49.12.4.77
    options:
      publish:
        - "127.0.0.1:4321:4321"    # Only exposed to localhost — tunnel connects here
      volume:
        - infront-admin-sites:/app/sites

registry:
  server: ghcr.io
  username:
    - GITHUB_USERNAME
  password:
    - GITHUB_TOKEN

builder:
  dockerfile: Dockerfile
  context: .

# No Kamal proxy — Cloudflare Tunnel handles everything
proxy:
  disabled: true

env:
  clear:
    HOST: "0.0.0.0"
    PORT: "4321"
    NODE_ENV: "production"
    AUTH_SERVICE_URL: "https://auth.infront.cy"
    PUBLIC_AUTH_SERVICE_URL: "https://auth.infront.cy"
  secret:
    - CLOUDFLARE_API_TOKEN
    - CLOUDFLARE_ACCOUNT_ID
    - CLOUDFLARE_ZONE_ID
