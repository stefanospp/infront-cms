services:
  directus:
    image: directus/directus:11.5
    ports:
      - "127.0.0.1:${PORT:-8060}:8055"
    environment:
      KEY: "${KEY}"
      SECRET: "${SECRET}"
      DB_CLIENT: "pg"
      DB_HOST: "database"
      DB_PORT: "5432"
      DB_DATABASE: "directus"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      PUBLIC_URL: "${PUBLIC_URL}"
      STORAGE_LOCATIONS: "s3"
      STORAGE_S3_DRIVER: "s3"
      STORAGE_S3_KEY: "${STORAGE_S3_KEY}"
      STORAGE_S3_SECRET: "${STORAGE_S3_SECRET}"
      STORAGE_S3_BUCKET: "${STORAGE_S3_BUCKET:-infront-uploads}"
      STORAGE_S3_REGION: "auto"
      STORAGE_S3_ENDPOINT: "${STORAGE_S3_ENDPOINT}"
      STORAGE_S3_ROOT: "${SLUG}/"
      EMAIL_FROM: "${EMAIL_FROM:-noreply@infront.cy}"
      EMAIL_TRANSPORT: "${EMAIL_TRANSPORT:-smtp}"
      EMAIL_SMTP_HOST: "${EMAIL_SMTP_HOST:-smtp.resend.com}"
      EMAIL_SMTP_PORT: "${EMAIL_SMTP_PORT:-465}"
      EMAIL_SMTP_SECURE: "${EMAIL_SMTP_SECURE:-true}"
      EMAIL_SMTP_USER: "${EMAIL_SMTP_USER:-resend}"
      EMAIL_SMTP_PASSWORD: "${EMAIL_SMTP_PASSWORD}"
    volumes:
      - directus_extensions:/directus/extensions
    depends_on:
      database:
        condition: service_started
    restart: unless-stopped

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "directus"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  directus_extensions:
  db_data:
