version: 1
directus: 11.5.1
vendor: postgres
collections:
  - collection: projects
    meta:
      collection: projects
      icon: videocam
      note: Portfolio projects
      sort_field: sort_order
      archive_field: status
      archive_value: archived
      unarchive_value: draft
      singleton: false
      accountability: all
    schema:
      name: projects
  - collection: services
    meta:
      collection: services
      icon: build
      note: Service offerings
      sort_field: sort_order
      singleton: false
      accountability: all
    schema:
      name: services
  - collection: testimonials
    meta:
      collection: testimonials
      icon: format_quote
      note: Client testimonials
      sort_field: sort_order
      singleton: false
      accountability: all
    schema:
      name: testimonials
  - collection: reels
    meta:
      collection: reels
      icon: play_circle
      note: Instagram reels
      sort_field: sort_order
      singleton: false
      accountability: all
    schema:
      name: reels
  - collection: hero
    meta:
      collection: hero
      icon: panorama
      note: Hero section content
      singleton: true
      accountability: all
    schema:
      name: hero
  - collection: about
    meta:
      collection: about
      icon: person
      note: About page content
      singleton: true
      accountability: all
    schema:
      name: about
  - collection: site_settings
    meta:
      collection: site_settings
      icon: settings
      note: Global site settings
      singleton: true
      accountability: all
    schema:
      name: site_settings
fields:
  # Projects
  - collection: projects
    field: id
    type: uuid
    schema:
      is_primary_key: true
      has_auto_increment: false
      is_nullable: false
    meta:
      special: [uuid]
      hidden: true
  - collection: projects
    field: status
    type: string
    schema:
      default_value: draft
      is_nullable: false
    meta:
      interface: select-dropdown
      options:
        choices:
          - text: Published
            value: published
          - text: Draft
            value: draft
          - text: Archived
            value: archived
      width: half
  - collection: projects
    field: sort_order
    type: integer
    schema:
      default_value: 0
    meta:
      interface: input
      width: half
  - collection: projects
    field: title
    type: string
    schema: {}
    meta:
      interface: input
      required: true
  - collection: projects
    field: slug
    type: string
    schema: {}
    meta:
      interface: input
  - collection: projects
    field: subtitle
    type: string
    schema: {}
    meta:
      interface: input
  - collection: projects
    field: image
    type: uuid
    schema: {}
    meta:
      interface: file-image
      special: [file]
  - collection: projects
    field: video_url
    type: string
    schema: {}
    meta:
      interface: input
      note: Direct video URL
  - collection: projects
    field: reel_url
    type: string
    schema: {}
    meta:
